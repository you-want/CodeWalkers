<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="app-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 
    macOS HIG standard: 
    The visible icon is roughly 824x824 inside a 1024x1024 canvas.
    100px padding on all sides.
    Scale factor: 824 / 1024 = 0.8046875
  -->
  <g transform="translate(100, 100) scale(0.8046875)">
    <!-- Base App Icon Shape (squircle-like), now scaled down and casting a native-like shadow -->
    <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg-gradient)" filter="url(#app-shadow)" />
    
    <!-- Terminal Header dots -->
    <circle cx="160" cy="160" r="24" fill="#ff5f56" />
    <circle cx="240" cy="160" r="24" fill="#ffbd2e" />
    <circle cx="320" cy="160" r="24" fill="#27c93f" />

    <!-- Code Prompt (">") -->
    <polyline 
      points="280,360 480,512 280,664" 
      fill="none" 
      stroke="#4af626" 
      stroke-width="72" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      filter="url(#glow)"
    />

    <!-- Underscore Cursor ("_") -->
    <line 
      x1="520" y1="664" 
      x2="720" y2="664" 
      stroke="#4af626" 
      stroke-width="72" 
      stroke-linecap="round" 
      filter="url(#glow)"
    />

    <!-- Walking Legs -->
    <!-- Left Leg -->
    <polyline 
      points="380,720 320,880 400,880" 
      fill="none" 
      stroke="#4af626" 
      stroke-width="48" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      filter="url(#glow)"
    />
    <!-- Right Leg -->
    <polyline 
      points="620,720 680,880 760,880" 
      fill="none" 
      stroke="#4af626" 
      stroke-width="48" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      filter="url(#glow)"
    />
  </g>
</svg>
